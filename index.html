<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filmarks Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#121212;
    color:#ffffff;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
}

header{
    background:#1f1f1f;
    padding:24px;
    text-align:center;
    border-bottom:1px solid #333;
}

header h1{
    font-size:30px;
}

header p{
    color:#bbbbbb;
    margin-top:8px;
}

.container{
    max-width:900px;
    margin:auto;
    padding:24px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:16px;
}

.card{
    background:#1e1e1e;
    border-radius:16px;
    padding:20px;
}

.card h2{
    font-size:16px;
    color:#aaaaaa;
}

.value{
    font-size:34px;
    margin-top:12px;
    font-weight:bold;
}

.section{
    margin-top:30px;
}

.section h2{
    margin-bottom:15px;
}

button{
    width:100%;
    background:#00c853;
    color:white;
    border:none;
    padding:16px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

footer{
    text-align:center;
    color:#777;
    margin:40px 0;
}
</style>

</head>

<body>

<header>
<h1>🎬 Filmarks Dashboard</h1>
<p>REM's Movie Database</p>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h2>🎥 総鑑賞本数</h2>
<div class="value">--</div>
</div>

<div class="card">
<h2>⭐ 平均評価</h2>
<div class="value">--</div>
</div>

<div class="card">
<h2>🏆 ベスト作品</h2>
<div class="value">--</div>
</div>

<div class="card">
<h2>📅 今年の鑑賞本数</h2>
<div class="value">--</div>
</div>

</div>

<div class="section">

<h2>📥 データ</h2>

<button>
Filmarksデータを読み込む
</button>

</div>

<div class="section">

<h2>🏅 ランキング</h2>

<p>データを読み込むと、ベスト10がここに表示されます。</p>

</div>

</div>

<footer>

Made with ❤️ for REM

</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filmarks Dashboard</title>
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>
<h1>🎬 Filmarks Dashboard</h1>
<p>REM's Movie Database<br/>
</p>
</header>

<div class="container">

<div class="cards">

<div class="card">
    <h2>🎥 総鑑賞本数</h2>
    <div class="value" id="totalMovies">--</div>
</div>

<div class="card">
    <h2>⭐ 平均評価</h2>
    <div class="value" id="averageRating">--</div>
</div>

<div class="card">
    <h2>🏆 ベスト作品</h2>
    <div class="value" id="bestMovie">--</div>
</div>

<div class="card">
    <h2>📅 今年の鑑賞本数</h2>
    <div class="value" id="yearMovies">--</div>
</div>

</div>

<div class="section">

<h2>📥 データ</h2>

<button>
Filmarksデータを読み込む
</button>

</div>

<section>

    <h2>映画一覧</h2>

    <p id="searchResult">
        全0件
    </p>

    <div class="searchArea">

        <input
            type="search"
            id="searchBox"
            placeholder="タイトルを検索">

        <select id="productionYearSelect">

            <option value="">
                公開年（すべて）
            </option>

        </select>
 
        <select id="watchedYearSelect">

            <option value="">
                鑑賞年（すべて）
            </option>

        </select>

        <select id="sortSelect">

            <option value="watched_desc">
                鑑賞日（新しい順）
            </option>

            <option value="watched_asc">
                鑑賞日（古い順）
            </option>

            <option value="rating_desc">
                評価（高い順）
            </option>

            <option value="rating_asc">
                評価（低い順）
            </option>

            <option value="year_desc">
                公開年（新しい順）
            </option>

            <option value="year_asc">
                公開年（古い順）
            </option>

        </select> 
 
    </div>
 
    <table id="movieTable">
        <thead>
            <tr>
                <th>評価</th>
                <th>タイトル</th>
                <th>公開年</th>
                <th>鑑賞日</th>
            </tr>
        </thead>

        <tbody id="movieTableBody">

        </tbody>

    </table>

    <section id="movieDetail">

        <h2>映画詳細</h2>

        <p>
            映画を選択してください
        </p>

    </section>
</section>

<footer>

<p>
    Made with ❤️ for REM
</p>

<p id="version">
    Version: v-.-.-
</p>

<p id="latest">
    xxxx
</p>

</footer>
<script src="js/config.js"></script>

<script src="js/movieService.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/movieTable.js"></script>
<script src="js/movieDetail.js"></script>
<script src="js/search.js"></script>
<script src="js/filterUtils.js"></script>
<script src="js/productionYearFilter.js"></script>
<script src="js/watchedYearFilter.js"></script>
<script src="js/sort.js"></script>
<script src="js/app.js?v=0.3.3"></script>

</body>
</html>

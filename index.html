<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filmarks Dashboard</title>
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>
<h1>🎬 Filmarks Dashboard</h1>
<p>REM's Movie Database<br/>
なう(2026/06/29 16:39:15)
</p>
</header>

<div class="container">

<div class="cards">

<div class="card">
    <h2>🎥 総鑑賞本数</h2>
    <div class="value" id="totalMovies">--</div>
</div>

<div class="card">
    <h2>⭐ 平均評価</h2>
    <div class="value" id="averageRating">--</div>
</div>

<div class="card">
    <h2>🏆 ベスト作品</h2>
    <div class="value" id="bestMovie">--</div>
</div>

<div class="card">
    <h2>📅 今年の鑑賞本数</h2>
    <div class="value" id="yearMovies">--</div>
</div>

</div>

<div class="section">

<h2>📥 データ</h2>

<button>
Filmarksデータを読み込む
</button>

</div>

<div class="section">

    <h2>🎬 映画一覧</h2>

    <table id="movieTable">
        <thead>
            <tr>
                <th>評価</th>
                <th>タイトル</th>
                <th>公開年</th>
                <th>鑑賞日</th>
            </tr>
        </thead>

        <tbody id="movieTableBody">

        </tbody>

    </table>

</div>

<footer>

Made with ❤️ for REM

</footer>

<script src="js/app.js"></script>

</body>
</html>

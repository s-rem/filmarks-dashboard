# .github/workflows/pages.yml
#
# Filmarks Dashboard
# GitHub Pagesへ静的サイトをデプロイする

name: Deploy GitHub Pages

# --------------------
# トリガー
# --------------------

on:

  # mainへpushしたら実行
  push:
    branches:
      - main

  # 手動実行
  workflow_dispatch:

# --------------------
# 権限
# --------------------

permissions:

  contents: read

  pages: write

  id-token: write

# --------------------
# 同時実行
# --------------------

concurrency:

  group: pages

  cancel-in-progress: true

# --------------------
# デプロイ
# --------------------

jobs:

  deploy:

    runs-on: ubuntu-latest

    environment:

      name: github-pages

      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      # ソース取得
      - name: Checkout

        uses: actions/checkout@v4

      # GitHub Pages初期化
      - name: Setup Pages

        uses: actions/configure-pages@v5

      # リポジトリ全体をそのまま公開
      - name: Upload Pages Artifact

        uses: actions/upload-pages-artifact@v3

        with:

          path: .

      # デプロイ
      - name: Deploy

        id: deployment

        uses: actions/deploy-pages@v5
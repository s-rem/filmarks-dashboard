name: Parse Filmarks Profile

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install cheerio

      - name: Fetch profile
        run: |
          curl \
            https://filmarks.com/users/rem_srem_jp?page=33 \
            -o profile.html

      - name: Parse profile
        run: |
          node scripts/parse-profile.js

      - name: Check next page with Cheerio
        run: |
          node <<'EOF'
          const fs = require("fs");
          const cheerio = require("cheerio");

          const html =
            fs.readFileSync(
              "profile.html",
              "utf8"
            );

          const $ = cheerio.load(html);

          console.log(
            "nextHref:",
            $('a[rel="next"]').attr("href")
          );
          EOF